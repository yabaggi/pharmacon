<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PharmaCare Consultation System | نظام استشارات فارماكير</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
/* ============================================================
   DESIGN SYSTEM — Medical Teal / Warm Ivory
   ============================================================ */
:root {
  --teal:       #0d7c7c;
  --teal-dark:  #085f5f;
  --teal-light: #e6f4f4;
  --teal-mid:   #c0e8e8;
  --amber:      #e88c2a;
  --amber-light:#fff4e5;
  --red:        #d94040;
  --red-light:  #fde8e8;
  --green:      #2e7d52;
  --green-light:#e8f5ee;
  --ivory:      #faf8f3;
  --paper:      #f3f0e8;
  --ink:        #1a1a1a;
  --ink-soft:   #4a4a4a;
  --ink-faint:  #8a8a8a;
  --border:     #ddd8cc;
  --white:      #ffffff;
  --shadow-sm:  0 1px 3px rgba(0,0,0,.08);
  --shadow-md:  0 4px 16px rgba(0,0,0,.10);
  --shadow-lg:  0 8px 32px rgba(0,0,0,.12);
  --radius:     12px;
  --font-en:    'DM Sans', sans-serif;
  --font-ar:    'Tajawal', sans-serif;
  --font-head:  'DM Serif Display', serif;
  --sidebar-w: 260px;
  --header-h:  60px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 15px; }

body {
  font-family: var(--font-en);
  background: var(--ivory);
  color: var(--ink);
  line-height: 1.6;
  min-height: 100vh;
}

[dir="rtl"] body { font-family: var(--font-ar); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--paper); }
::-webkit-scrollbar-thumb { background: var(--teal-mid); border-radius: 3px; }

/* ── Typography ── */
h1,h2,h3,h4 { font-family: var(--font-head); font-weight: 400; line-height: 1.2; }
[dir="rtl"] h1,[dir="rtl"] h2,[dir="rtl"] h3,[dir="rtl"] h4 { font-family: var(--font-ar); font-weight: 700; }

/* ── Utility ── */
.hidden { display: none !important; }
.flex    { display: flex; }
.gap-1   { gap: 8px; }
.gap-2   { gap: 16px; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.text-sm { font-size: .85rem; }
.text-xs { font-size: .75rem; }
.text-muted { color: var(--ink-faint); }
.text-right { text-align: right; }
.truncate { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ── Badges ── */
.badge {
  display: inline-flex; align-items: center; padding: 2px 10px;
  border-radius: 20px; font-size: .7rem; font-weight: 600; letter-spacing: .5px; text-transform: uppercase;
}
.badge-open     { background: var(--amber-light); color: var(--amber); }
.badge-progress { background: #e8eeff; color: #3355cc; }
.badge-resolved { background: var(--green-light); color: var(--green); }
.badge-closed   { background: var(--paper); color: var(--ink-faint); }
.badge-urgent   { background: var(--red-light); color: var(--red); }
.badge-high     { background: #fff4e5; color: #c95e00; }
.badge-normal   { background: var(--teal-light); color: var(--teal); }
.badge-low      { background: var(--paper); color: var(--ink-faint); }
.badge-role-cp  { background: var(--teal-light); color: var(--teal); }
.badge-role-vp  { background: #eef3ff; color: #3355cc; }
.badge-role-pt  { background: var(--amber-light); color: var(--amber); }
.badge-role-ad  { background: var(--red-light); color: var(--red); }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 20px; border-radius: 8px; border: none;
  font-family: inherit; font-size: .875rem; font-weight: 500;
  cursor: pointer; transition: all .18s; text-decoration: none; white-space: nowrap;
}
.btn-primary   { background: var(--teal); color: #fff; }
.btn-primary:hover   { background: var(--teal-dark); box-shadow: 0 3px 10px rgba(13,124,124,.3); }
.btn-secondary { background: var(--teal-light); color: var(--teal); }
.btn-secondary:hover { background: var(--teal-mid); }
.btn-outline   { background: transparent; color: var(--teal); border: 1.5px solid var(--teal); }
.btn-outline:hover { background: var(--teal-light); }
.btn-danger    { background: var(--red-light); color: var(--red); }
.btn-danger:hover { background: #fcd0d0; }
.btn-sm        { padding: 6px 13px; font-size: .8rem; }
.btn-icon      { padding: 8px; border-radius: 8px; background: transparent; color: var(--ink-soft); }
.btn-icon:hover { background: var(--paper); color: var(--teal); }
.btn:disabled  { opacity: .5; cursor: not-allowed; }
.btn-loading   { position: relative; color: transparent !important; }
.btn-loading::after {
  content: ''; position: absolute; inset: 0; margin: auto;
  width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.6);
  border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite;
}

/* ── Inputs ── */
.form-group { margin-bottom: 18px; }
.form-label {
  display: block; margin-bottom: 6px;
  font-size: .82rem; font-weight: 600; color: var(--ink-soft);
  text-transform: uppercase; letter-spacing: .5px;
}
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
  border-radius: 8px; background: var(--white); font-family: inherit; font-size: .9rem;
  color: var(--ink); transition: border-color .18s, box-shadow .18s; outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--teal); box-shadow: 0 0 0 3px rgba(13,124,124,.12);
}
.form-textarea { resize: vertical; min-height: 90px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

/* ── Cards ── */
.card {
  background: var(--white); border-radius: var(--radius);
  border: 1px solid var(--border); box-shadow: var(--shadow-sm);
}
.card-body   { padding: 24px; }
.card-header { padding: 18px 24px; border-bottom: 1px solid var(--border); }
.card-footer { padding: 14px 24px; border-top: 1px solid var(--border); background: var(--ivory); border-radius: 0 0 var(--radius) var(--radius); }

/* ── Layout ── */
#app { display: flex; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ── */
#sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--teal-dark); color: #fff;
  display: flex; flex-direction: column;
  transition: transform .25s; z-index: 200;
}

.sidebar-logo {
  padding: 22px 20px 18px;
  border-bottom: 1px solid rgba(255,255,255,.12);
}
.sidebar-logo .logo-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: rgba(255,255,255,.18); display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; margin-bottom: 10px;
}
.sidebar-logo .logo-name {
  font-family: var(--font-head); font-size: 1.3rem; color: #fff; display: block;
}
[dir="rtl"] .sidebar-logo .logo-name { font-family: var(--font-ar); font-size: 1.2rem; }
.sidebar-logo .logo-sub { font-size: .72rem; opacity: .65; display: block; margin-top: 2px; }

.sidebar-nav { flex: 1; overflow-y: auto; padding: 12px 10px; }

.nav-section-label {
  font-size: .65rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  opacity: .5; padding: 14px 10px 6px; display: block;
}

.nav-item {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 12px; border-radius: 8px;
  color: rgba(255,255,255,.8); font-size: .875rem; font-weight: 500;
  cursor: pointer; transition: all .16s; text-decoration: none; margin-bottom: 2px;
  position: relative;
}
.nav-item:hover { background: rgba(255,255,255,.1); color: #fff; }
.nav-item.active { background: rgba(255,255,255,.18); color: #fff; }
.nav-item .nav-icon { width: 20px; text-align: center; font-size: 1rem; flex-shrink: 0; }
.nav-item .nav-badge {
  margin-left: auto; background: var(--amber); color: #fff;
  font-size: .65rem; font-weight: 700; padding: 1px 7px;
  border-radius: 10px; min-width: 20px; text-align: center;
}
[dir="rtl"] .nav-item .nav-badge { margin-left: 0; margin-right: auto; }

.sidebar-user {
  padding: 14px 16px; border-top: 1px solid rgba(255,255,255,.12);
  display: flex; align-items: center; gap: 10px;
}
.sidebar-user .avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,.25); display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: .9rem; flex-shrink: 0; color: #fff;
}
.sidebar-user .user-info { flex: 1; min-width: 0; }
.sidebar-user .user-name  { font-size: .85rem; font-weight: 600; color: #fff; display: block; }
.sidebar-user .user-role  { font-size: .7rem; opacity: .6; display: block; }

/* ── MAIN ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ── TOPBAR ── */
#topbar {
  height: var(--header-h); flex-shrink: 0;
  background: var(--white); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 16px;
  box-shadow: var(--shadow-sm);
}
#topbar .topbar-title { font-family: var(--font-head); font-size: 1.3rem; color: var(--ink); flex: 1; }
[dir="rtl"] #topbar .topbar-title { font-family: var(--font-ar); font-weight: 700; }
#topbar .topbar-actions { display: flex; align-items: center; gap: 8px; }

.lang-toggle {
  display: flex; align-items: center; gap: 6px;
  background: var(--paper); border-radius: 8px; padding: 5px 12px;
  font-size: .8rem; font-weight: 600; cursor: pointer; border: none;
  color: var(--ink-soft); transition: all .16s;
}
.lang-toggle:hover { background: var(--teal-light); color: var(--teal); }

.notif-btn { position: relative; }
.notif-dot {
  position: absolute; top: 4px; right: 4px; width: 8px; height: 8px;
  background: var(--red); border-radius: 50%; border: 2px solid var(--white);
}

/* ── CONTENT ── */
#content {
  flex: 1; overflow-y: auto; padding: 24px;
  background: var(--ivory);
}

/* ── PAGE SECTIONS ── */
.page { animation: fadeIn .25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }

.page-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.page-header h2 { font-size: 1.7rem; color: var(--ink); }
[dir="rtl"] .page-header h2 { font-family: var(--font-ar); }
.page-header .subtitle { color: var(--ink-faint); font-size: .9rem; margin-top: 4px; }

/* ── STATS GRID ── */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--white); border-radius: var(--radius); border: 1px solid var(--border);
  padding: 20px; display: flex; flex-direction: column; gap: 8px;
  transition: box-shadow .18s, transform .18s;
}
.stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.stat-card .stat-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
}
.stat-card .stat-val   { font-size: 1.8rem; font-weight: 700; line-height: 1; }
.stat-card .stat-label { font-size: .8rem; color: var(--ink-faint); font-weight: 500; }

/* ── TABLE ── */
.table-wrap { overflow-x: auto; border-radius: var(--radius); }
table { width: 100%; border-collapse: collapse; font-size: .875rem; }
thead th {
  background: var(--paper); padding: 10px 14px; text-align: left;
  font-size: .72rem; text-transform: uppercase; letter-spacing: .7px;
  color: var(--ink-faint); font-weight: 700; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
[dir="rtl"] thead th { text-align: right; }
tbody td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr { transition: background .12s; cursor: pointer; }
tbody tr:hover { background: var(--teal-light); }

/* ── CONSULTATION LIST ── */
.consult-card {
  background: var(--white); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px 20px; cursor: pointer; transition: all .18s; margin-bottom: 10px;
  display: flex; gap: 16px; align-items: flex-start;
}
.consult-card:hover { border-color: var(--teal); box-shadow: var(--shadow-md); transform: translateX(3px); }
[dir="rtl"] .consult-card:hover { transform: translateX(-3px); }
.consult-card .consult-icon {
  width: 42px; height: 42px; border-radius: 10px; background: var(--teal-light);
  display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0;
}
.consult-card .consult-body { flex: 1; min-width: 0; }
.consult-card .consult-title { font-weight: 600; font-size: .95rem; margin-bottom: 4px; }
.consult-card .consult-meta  { font-size: .78rem; color: var(--ink-faint); display: flex; gap: 10px; flex-wrap: wrap; }
.consult-card .consult-right { flex-shrink: 0; text-align: right; display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }

/* ── CHAT ── */
.chat-container {
  display: flex; flex-direction: column; height: 100%;
  background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden;
}
.chat-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  background: var(--white); flex-shrink: 0;
}
.chat-messages {
  flex: 1; overflow-y: auto; padding: 20px;
  display: flex; flex-direction: column; gap: 14px;
  background: var(--ivory);
}
.msg { display: flex; gap: 10px; max-width: 75%; }
.msg-patient   { align-self: flex-end; flex-direction: row-reverse; }
.msg-pharmacist { align-self: flex-start; }
.msg-system    { align-self: center; max-width: 90%; }

.msg-avatar {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem; font-weight: 700; color: #fff;
}
.msg-avatar-p  { background: var(--amber); }
.msg-avatar-ph { background: var(--teal); }

.msg-bubble {
  padding: 10px 14px; border-radius: 12px; font-size: .875rem; line-height: 1.5;
}
.msg-patient   .msg-bubble { background: var(--teal); color: #fff; border-bottom-right-radius: 4px; }
.msg-pharmacist .msg-bubble { background: var(--white); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg-system .msg-bubble { background: var(--paper); color: var(--ink-faint); font-size: .78rem; text-align: center; border-radius: 20px; }

.msg-time { font-size: .68rem; opacity: .6; margin-top: 4px; display: block; text-align: right; }
[dir="rtl"] .msg-time { text-align: left; }

.chat-input-bar {
  padding: 14px 20px; border-top: 1px solid var(--border); background: var(--white);
  display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
}
.chat-input-bar textarea {
  flex: 1; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 10px;
  font-family: inherit; font-size: .875rem; resize: none; max-height: 120px;
  outline: none; transition: border-color .18s;
}
.chat-input-bar textarea:focus { border-color: var(--teal); }

/* ── DRUG SEARCH ── */
.drug-card {
  background: var(--white); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px 20px; margin-bottom: 10px; transition: border-color .16s;
}
.drug-card:hover { border-color: var(--teal); }
.drug-card .drug-name    { font-size: 1rem; font-weight: 700; color: var(--teal); }
.drug-card .drug-generic { font-size: .82rem; color: var(--ink-faint); margin-bottom: 10px; }
.drug-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media(max-width:600px) { .drug-detail-grid { grid-template-columns: 1fr; } }
.drug-detail-item .label { font-size: .7rem; text-transform: uppercase; letter-spacing: .5px; color: var(--ink-faint); font-weight: 700; margin-bottom: 3px; }
.drug-detail-item .value { font-size: .85rem; }

/* ── PATIENT RECORD ── */
.allergy-chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--red-light); color: var(--red); border-radius: 20px;
  padding: 3px 10px; font-size: .78rem; font-weight: 600; margin: 3px;
}
.med-chip {
  display: inline-flex; align-items: center;
  background: var(--teal-light); color: var(--teal-dark); border-radius: 6px;
  padding: 5px 12px; font-size: .82rem; margin: 3px;
}

/* ── CHART ── */
.chart-bar-wrap { display: flex; flex-direction: column; gap: 10px; padding-top: 8px; }
.chart-bar-row  { display: flex; align-items: center; gap: 10px; font-size: .82rem; }
.chart-bar-label { width: 90px; text-align: right; color: var(--ink-soft); flex-shrink: 0; }
[dir="rtl"] .chart-bar-label { text-align: left; }
.chart-bar-track { flex: 1; height: 22px; background: var(--paper); border-radius: 4px; overflow: hidden; }
.chart-bar-fill  { height: 100%; background: var(--teal); border-radius: 4px; transition: width .5s ease; display: flex; align-items: center; padding-left: 8px; }
.chart-bar-fill span { font-size: .72rem; color: rgba(255,255,255,.9); font-weight: 700; }

/* ── RATING STARS ── */
.stars { display: flex; gap: 3px; }
.star  { font-size: 1.1rem; cursor: pointer; transition: transform .12s; }
.star:hover { transform: scale(1.2); }
.star.filled { color: #f5a623; }
.star.empty  { color: var(--border); }

/* ── AUTH PAGE ── */
#auth-screen {
  min-height: 100vh; background: var(--teal-dark);
  display: flex; align-items: center; justify-content: center; padding: 24px;
}
.auth-card {
  background: var(--white); border-radius: 16px; width: 100%; max-width: 440px;
  box-shadow: 0 20px 60px rgba(0,0,0,.25); overflow: hidden;
}
.auth-header {
  background: linear-gradient(135deg, var(--teal-dark), var(--teal));
  padding: 32px; text-align: center; color: #fff;
}
.auth-header .auth-logo { font-size: 2.5rem; margin-bottom: 12px; }
.auth-header h1 { font-family: var(--font-head); font-size: 1.6rem; margin-bottom: 4px; }
[dir="rtl"] .auth-header h1 { font-family: var(--font-ar); }
.auth-header p { opacity: .75; font-size: .85rem; }
.auth-body { padding: 32px; }
.auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden; }
.auth-tab { flex: 1; padding: 9px; text-align: center; font-size: .85rem; font-weight: 600; cursor: pointer; background: transparent; border: none; color: var(--ink-faint); transition: all .16s; }
.auth-tab.active { background: var(--teal); color: #fff; }
.auth-footer { padding: 16px 32px; background: var(--ivory); border-top: 1px solid var(--border); text-align: center; font-size: .8rem; color: var(--ink-faint); }

/* ── NOTIFICATIONS PANEL ── */
.notif-panel {
  position: fixed; top: var(--header-h); right: 16px; width: 340px; max-height: 480px;
  background: var(--white); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow-lg); z-index: 1000; overflow: hidden;
  display: flex; flex-direction: column; animation: slideDown .2s ease;
}
[dir="rtl"] .notif-panel { right: auto; left: 16px; }
@keyframes slideDown { from { opacity:0; transform: translateY(-8px); } to { opacity:1; transform: translateY(0); } }
.notif-panel-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.notif-panel-header span { font-weight: 700; font-size: .95rem; }
.notif-list { overflow-y: auto; flex: 1; }
.notif-item { padding: 12px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s; }
.notif-item:hover { background: var(--teal-light); }
.notif-item.unread { background: var(--teal-light); border-left: 3px solid var(--teal); }
[dir="rtl"] .notif-item.unread { border-left: none; border-right: 3px solid var(--teal); }
.notif-item .notif-title { font-size: .87rem; font-weight: 600; margin-bottom: 2px; }
.notif-item .notif-body  { font-size: .78rem; color: var(--ink-faint); }
.notif-item .notif-time  { font-size: .7rem; color: var(--ink-faint); margin-top: 4px; }
.notif-empty { padding: 32px; text-align: center; color: var(--ink-faint); font-size: .9rem; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45);
  display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 16px;
  animation: fadeIn .18s;
}
.modal {
  background: var(--white); border-radius: 16px; width: 100%; max-width: 560px;
  max-height: 90vh; display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,.25); animation: fadeIn .22s;
}
.modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

.modal-body   { padding: 24px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 56px 24px; color: var(--ink-faint); }
.empty-state .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: .4; }
.empty-state h3 { font-size: 1.1rem; margin-bottom: 8px; color: var(--ink-soft); }
.empty-state p  { font-size: .875rem; max-width: 320px; margin: 0 auto 20px; }

/* ── MOBILE SIDEBAR ── */
#menu-toggle { display: none; }
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 190; }

@media (max-width: 768px) {
  :root { --sidebar-w: 240px; }
  #sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
  [dir="rtl"] #sidebar { left: auto; right: 0; transform: translateX(100%); }
  #sidebar.open { transform: translateX(0); }
  [dir="rtl"] #sidebar.open { transform: translateX(0); }
  #menu-toggle { display: flex; }
  .sidebar-overlay.visible { display: block; }
  #content { padding: 16px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 480px) {
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .modal { max-width: 100%; border-radius: 12px 12px 0 0; align-self: flex-end; }
  .modal-overlay { align-items: flex-end; }
}

/* ── DETAIL PAGE LAYOUT ── */
.detail-grid { display: grid; grid-template-columns: 1fr 340px; gap: 20px; height: calc(100vh - var(--header-h) - 48px); }
@media (max-width: 960px) { .detail-grid { grid-template-columns: 1fr; height: auto; } }

/* ── SEARCH BAR ── */
.search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
.search-input-wrap { position: relative; flex: 1; }
.search-input-wrap .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--ink-faint); font-size: .9rem; }
[dir="rtl"] .search-input-wrap .search-icon { left: auto; right: 12px; }
.search-input-wrap input { padding-left: 36px; width: 100%; }
[dir="rtl"] .search-input-wrap input { padding-left: 14px; padding-right: 36px; }

/* ── TABS ── */
.tab-list { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
.tab-item {
  padding: 10px 20px; font-size: .87rem; font-weight: 600; cursor: pointer;
  color: var(--ink-faint); border-bottom: 2px solid transparent; margin-bottom: -2px;
  transition: color .16s, border-color .16s; background: none; border-top: none; border-left: none; border-right: none;
}
.tab-item:hover   { color: var(--teal); }
.tab-item.active  { color: var(--teal); border-bottom-color: var(--teal); }

/* ── PROGRESS ── */
.progress-bar { height: 6px; background: var(--paper); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--teal); border-radius: 3px; transition: width .4s; }

/* ── PILL SELECT ── */
.pill-group { display: flex; flex-wrap: wrap; gap: 8px; }
.pill { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--white); font-size: .82rem; font-weight: 600; cursor: pointer; color: var(--ink-soft); transition: all .14s; }

// ============================================================
// API
// ============================================================
const BASE = '';

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (S.token) opts.headers['Authorization'] = 'Bearer ' + S.token;
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(BASE + '/api' + path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ============================================================
// AUTH
// ============================================================
function switchAuthTab(tab) {
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}

function toggleLicenseField() {
  const role = document.getElementById('reg-role').value;
  document.getElementById('license-group').classList.toggle('hidden', role === 'patient');
}

async function doLogin() {
  const btn = document.getElementById('login-btn');
  btn.classList.add('btn-loading');
  try {
    const data = await api('POST', '/auth/login', {
      email: document.getElementById('login-email').value,
      password: document.getElementById('login-pw').value,
    });
    S.token = data.token;
    S.user = data.user;
    localStorage.setItem('pharma_token', S.token);
    initApp();
  } catch (e) {
    alert(e.message);
  } finally {
    btn.classList.remove('btn-loading');
  }
}

async function doRegister() {
  const btn = document.getElementById('register-btn');
  btn.classList.add('btn-loading');
  try {
    const data = await api('POST', '/auth/register', {
      name: document.getElementById('reg-name').value,
      name_ar: document.getElementById('reg-name-ar').value,
      email: document.getElementById('reg-email').value,
      password: document.getElementById('reg-pw').value,
      role: document.getElementById('reg-role').value,
      license_number: document.getElementById('reg-license').value || null,
      phone: document.getElementById('reg-phone').value,
    });
    S.token = data.token;
    S.user = data.user;
    localStorage.setItem('pharma_token', S.token);
    initApp();
  } catch (e) {
    alert(e.message);
  } finally {
    btn.classList.remove('btn-loading');
  }
}

function doLogout() {
  S.token = null; S.user = null;
  localStorage.removeItem('pharma_token');
  clearInterval(S.pollInterval);
  document.getElementById('app').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
}

// ============================================================
// INIT APP
// ============================================================
async function initApp() {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  buildSidebar();
  await loadNotifications();
  navigate('dashboard');
  S.pollInterval = setInterval(loadNotifications, 15000);
}

function toggleLang() {
  S.lang = S.lang === 'en' ? 'ar' : 'en';
  applyLang();
}

function applyLang() {
  const isAr = S.lang === 'ar';
  document.documentElement.lang = S.lang;
  document.documentElement.dir = isAr ? 'rtl' : 'ltr';
  // Auth page
  const langFlag = isAr ? '🇬🇧' : '🇸🇦';
  const langLabel = isAr ? 'English' : 'عربي';
  document.querySelectorAll('#lang-flag,#app-lang-flag').forEach(e => e.textContent = langFlag);
  document.querySelectorAll('#lang-label,#app-lang-label').forEach(e => e.textContent = langLabel);
  document.getElementById('auth-logo-name').textContent = t('brand_name');
  document.getElementById('auth-logo-sub').textContent = t('consult_auth_sub');
  document.getElementById('demo-title').textContent = t('demo_title');
  document.getElementById('tab-login').textContent = t('sign_in');
  document.getElementById('tab-register').textContent = t('register');
  document.querySelectorAll('#lbl-email,#lbl-email2').forEach(e => e.textContent = t('email'));
  document.querySelectorAll('#lbl-pw,#lbl-pw2').forEach(e => e.textContent = t('password'));
  document.getElementById('lbl-name').textContent = t('full_name');
  document.getElementById('lbl-name-ar').textContent = t('name_ar');
  document.getElementById('lbl-role').textContent = t('role');
  document.getElementById('lbl-phone').textContent = t('phone');
  document.getElementById('lbl-license').textContent = t('license');
  document.getElementById('lbl-signin').textContent = t('sign_in');
  document.getElementById('lbl-register').textContent = t('register');
  if (S.user) { buildSidebar(); navigate(S.page); }
}

    { id:'consultations', icon:'💬', key:'consultations' },
    { id:'patients', icon:'👥', key:'patients' },
    { id:'drugs', icon:'💊', key:'drugs' },
    { id:'analytics', icon:'📊', key:'analytics' },
    { id:'users', icon:'👤', key:'users' },

function roleLabel(role) {
  const m = { community_pharmacist:'role_cp', volunteer_pharmacist:'role_vp', patient:'role_pt', admin:'role_ad' };
  return t(m[role] || role);
}

function buildSidebar() {
  if (!S.user) return;
  const nav = document.getElementById('sidebar-nav');
  const items = NAV_ITEMS[S.user.role] || NAV_ITEMS.patient;
  nav.innerHTML = items.map(item => `
    <a class="nav-item ${S.page === item.id ? 'active' : ''}" onclick="navigate('${item.id}')" id="nav-${item.id}">
      <span class="nav-icon">${item.icon}</span>
      <span>${t(item.key)}</span>
      ${item.id==='consultations' && S.unreadNotif > 0 ? `<span class="nav-badge">${S.unreadNotif}</span>` : ''}

  `).join('') + `
    <a class="nav-item" onclick="navigate('profile')">
      <span class="nav-icon">⚙️</span>
      <span>${t('my_profile')}</span>
    </a>
    <a class="nav-item" onclick="doLogout()" style="color:rgba(255,120,120,.8)">
      <span class="nav-icon">🚪</span>
      <span>${t('logout')}</span>
    </a>
  `;
  const uInfo = document.getElementById('sidebar-user-info');
  const initials = (S.user.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  uInfo.innerHTML = `
    <div class="avatar">${initials}</div>
    <div class="user-info">
      <span class="user-name truncate">${S.lang === 'ar' && S.user.name_ar ? S.user.name_ar : S.user.name}</span>
      <span class="user-role">${roleLabel(S.user.role)}</span>

  document.getElementById('brand-name').textContent = t('brand_name');
  document.getElementById('brand-sub').textContent = t('brand_sub');

// ============================================================
// ROUTER
// ============================================================
async function navigate(page, params) {
  S.page = page;
  closeSidebar();
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');
  const content = document.getElementById('content');
  const pageTitle = document.getElementById('page-title');

  content.innerHTML = `<div class="empty-state"><div class="empty-icon">⏳</div><p>${t('loading')}</p></div>`;

  try {
    switch(page) {
      case 'dashboard':     pageTitle.textContent = t('dashboard');      await renderDashboard(content); break;
      case 'consultations': pageTitle.textContent = t('consultations');  await renderConsultations(content, params); break;
      case 'consult-detail': pageTitle.textContent = t('consultations'); await renderConsultDetail(content, params); break;
      case 'patients':      pageTitle.textContent = t('patients');       await renderPatients(content); break;
      case 'drugs':         pageTitle.textContent = t('drugs');          await renderDrugs(content); break;
      case 'analytics':     pageTitle.textContent = t('analytics');      await renderAnalytics(content); break;
      case 'users':         pageTitle.textContent = t('users');          await renderUsers(content); break;
      case 'my-record':     pageTitle.textContent = t('my_record');      await renderMyRecord(content); break;
      case 'profile':       pageTitle.textContent = t('my_profile');     await renderProfile(content); break;
      default: content.innerHTML = '<p>Page not found</p>';
    }
  } catch (e) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Error</h3><p>${e.message}</p></div>`;
  }
}

async function renderDashboard(el) {
  const isPharm = ['community_pharmacist','volunteer_pharmacist','admin'].includes(S.user.role);
  let analytics = null;
  let consults = [];

  const name = S.lang === 'ar' && S.user.name_ar ? S.user.name_ar : S.user.name;

  if (isPharm) {
    [analytics, consults] = await Promise.all([
      api('GET', '/analytics'),
      api('GET', '/consultations?status=open'),
    ]);
  } else {
    consults = await api('GET', '/consultations');
  }

  const statsHtml = isPharm && analytics ? `
    <div class="stats-grid">
      ${statCard('💬', analytics.totals.consultations, t('total'), '#e6f4f4', '#0d7c7c')}
      ${statCard('🟡', analytics.totals.open, t('open'), '#fff4e5', '#e88c2a')}
      ${statCard('🔵', analytics.totals.in_progress, t('in_progress'), '#e8eeff', '#3355cc')}
      ${statCard('✅', analytics.totals.resolved, t('resolved'), '#e8f5ee', '#2e7d52')}
      ${statCard('👥', analytics.totals.patients, t('patients_lbl'), '#e6f4f4', '#0d7c7c')}
      ${statCard('⭐', analytics.totals.avg_rating || '—', t('avg_rating'), '#fff4e5', '#e88c2a')}
      ${statCard('📨', analytics.totals.messages, t('messages_lbl'), '#eef3ff', '#3355cc')}
    </div>
  ` : `
    <div class="stats-grid">
      ${statCard('💬', consults.length, t('total'), '#e6f4f4', '#0d7c7c')}
      ${statCard('🟡', consults.filter(c=>c.status==='open').length, t('open'), '#fff4e5', '#e88c2a')}
      ${statCard('🔵', consults.filter(c=>c.status==='in_progress').length, t('in_progress'), '#e8eeff', '#3355cc')}
      ${statCard('✅', consults.filter(c=>c.status==='resolved').length, t('resolved'), '#e8f5ee', '#2e7d52')}
    </div>
  `;

  const recentHtml = consults.slice(0,5).map(c => consultCardHtml(c)).join('') ||
    `<div class="empty-state" style="padding:32px"><div class="empty-icon">📭</div><p>${t('no_data')}</p></div>`;

  el.innerHTML = `
    <div class="page">
      <div class="page-header">
        <div>
          <h2>${t('welcome')} ${name}</h2>
          <p class="subtitle">${t('overview')}</p>
        </div>
        ${S.user.role === 'patient' ? `<button class="btn btn-primary" onclick="showNewConsultModal()">＋ ${t('new_consultation')}</button>` : ''}
      </div>
      ${statsHtml}
      <div style="display:grid;grid-template-columns:${isPharm && analytics ? '1fr 320px' : '1fr'};gap:20px">
        <div class="card">
          <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
            <strong>${t('recent_consults')}</strong>
            <button class="btn btn-sm btn-secondary" onclick="navigate('consultations')">${t('view_all')}</button>
          </div>
          <div class="card-body" style="padding:12px">${recentHtml}</div>
        </div>
        ${isPharm && analytics ? renderByCategory(analytics) : ''}
      </div>
    </div>
  `;
}

function statCard(icon, val, label, bg, color) {
  return `<div class="stat-card">
    <div class="stat-icon" style="background:${bg};color:${color}">${icon}</div>
    <div class="stat-val" style="color:${color}">${val}</div>
    <div class="stat-label">${label}</div>
  </div>`;
}

function renderByCategory(analytics) {
  const cats = analytics.by_category || [];
  const max = cats[0]?.count || 1;
  const bars = cats.map(c => `
    <div class="chart-bar-row">
      <span class="chart-bar-label">${t('category_' + c.category.replace('_int','_int').replace('_eff','_eff')) || c.category}</span>
      <div class="chart-bar-track">
        <div class="chart-bar-fill" style="width:${Math.round(c.count/max*100)}%">
          <span>${c.count}</span>
        </div>
      </div>
    </div>
  `).join('');
  return `<div class="card"><div class="card-header"><strong>${t('by_category')}</strong></div>
    <div class="card-body"><div class="chart-bar-wrap">${bars || `<p class="text-muted">${t('no_data')}</p>`}</div></div></div>`;
}

async function renderConsultations(el, params) {
  let status = params?.status || '';
  const consults = await api('GET', '/consultations' + (status ? '?status=' + status : ''));
  S.consultations = consults;

  const statuses = ['', 'open', 'in_progress', 'resolved', 'closed'];
  const tabs = statuses.map(s => `
    <button class="tab-item ${status===s?'active':''}" onclick="filterConsultations('${s}')">
      ${s ? t(s === 'in_progress' ? 'in_progress' : s) : t('all')}
      <span style="margin-left:5px;opacity:.6;font-size:.75rem">(${consults.filter(c=>s?c.status===s:true).length})</span>
    </button>
  `).join('');

  const cards = consults.map(c => consultCardHtml(c)).join('') ||
    `<div class="empty-state"><div class="empty-icon">📭</div><h3>${t('no_data')}</h3>
     ${S.user.role==='patient'?`<button class="btn btn-primary" onclick="showNewConsultModal()">＋ ${t('new_consultation')}</button>`:''}
     </div>`;

  el.innerHTML = `
    <div class="page">
      <div class="page-header">
        <h2>${t('consultations')}</h2>
        ${S.user.role === 'patient' ? `<button class="btn btn-primary" onclick="showNewConsultModal()">＋ ${t('new_consultation')}</button>` : ''}
      </div>
      <div class="tab-list">${tabs}</div>
      <div id="consult-list">${cards}</div>
    </div>
  `;
}

function filterConsultations(status) { navigate('consultations', { status }); }

function consultCardHtml(c) {
  const priorityBadge = `<span class="badge badge-${c.priority}">${t(c.priority)}</span>`;
  const statusBadge   = `<span class="badge badge-${c.status === 'in_progress' ? 'progress' : c.status}">${t(c.status === 'in_progress' ? 'in_progress' : c.status)}</span>`;
  const catIcons = { general:'💬', drug_interaction:'⚗️', side_effects:'⚠️', dosage:'📏', allergy:'🌿', chronic:'🏥' };
  const icon = catIcons[c.category] || '💬';
  const title = S.lang === 'ar' && c.subject_ar ? c.subject_ar : c.subject;
  const phName = S.lang === 'ar' && c.pharmacist_name_ar ? c.pharmacist_name_ar : (c.pharmacist_name || t('unassigned'));
  const ptName = S.lang === 'ar' && c.patient_name_ar ? c.patient_name_ar : c.patient_name;
  const meta = S.user.role === 'patient'
    ? `${t('pharmacist_name')}: ${phName}`
    : `${t('patient_name')}: ${ptName || '—'}`;

  return `
    <div class="consult-card" onclick="navigate('consult-detail', {id:${c.id}})">
      <div class="consult-icon">${icon}</div>
      <div class="consult-body">
        <div class="consult-title">${title}</div>
        <div class="consult-meta">
          <span>${meta}</span>
          <span>📅 ${fmtDate(c.created_at)}</span>
          ${c.drug_names ? `<span>💊 ${c.drug_names}</span>` : ''}
        </div>
      </div>
      <div class="consult-right">${statusBadge}${priorityBadge}</div>
    </div>`;
}

async function renderConsultDetail(el, params) {
  const [consult, msgsData] = await Promise.all([
    api('GET', `/consultations/${params.id}`),
    api('GET', `/consultations/${params.id}/messages`),
  ]);
  
  // Handle both array and {results:[]} responses
  const msgs = Array.isArray(msgsData) ? msgsData : (msgsData.results || []);

  const isPharm = ['community_pharmacist','volunteer_pharmacist','admin'].includes(S.user.role);
  const isPatient = S.user.role === 'patient';
  const canAssign = isPharm && !consult.pharmacist_id;
  const canResolve = isPharm && consult.status === 'in_progress';

  const title = S.lang === 'ar' && consult.subject_ar ? consult.subject_ar : consult.subject;
  const desc  = S.lang === 'ar' && consult.description_ar ? consult.description_ar : consult.description;
  const phName = S.lang === 'ar' && consult.pharmacist_name_ar ? consult.pharmacist_name_ar : consult.pharmacist_name;
  const ptName = S.lang === 'ar' && consult.patient_name_ar ? consult.patient_name_ar : consult.patient_name;

  const messagesHtml = msgs.map(m => {
    const isMine = m.sender_id === S.user.id;
    const isPh   = m.sender_role !== 'patient';
    const cls    = isMine ? (isPatient ? 'msg-patient' : 'msg-pharmacist') : (isPh ? 'msg-pharmacist' : 'msg-patient');
    const avCls  = isPh ? 'msg-avatar-ph' : 'msg-avatar-p';
    const init   = (m.sender_name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const body   = S.lang === 'ar' && m.body_ar ? m.body_ar : m.body;
    return `<div class="msg ${cls}">
      <div class="msg-avatar ${avCls}">${init}</div>
      <div>
        <div class="msg-bubble">${escHtml(body)}</div>
        <span class="msg-time">${fmtTime(m.created_at)}</span>
      </div>
    </div>`;
  }).join('') || `<div class="msg msg-system"><div class="msg-bubble">Consultation opened — send a message to get started / افتُحت الاستشارة — أرسل رسالة للبدء</div></div>`;

  const ratingHtml = isPatient && consult.status === 'resolved' && !consult.rating ? `
    <div style="padding:16px 20px;background:var(--amber-light);border-top:1px solid var(--border)">
      <p style="font-size:.85rem;font-weight:600;margin-bottom:8px">${t('rate_consult')}</p>
      <div class="stars" id="rating-stars">
        ${[1,2,3,4,5].map(i=>`<span class="star empty" data-v="${i}" onclick="setRating(${i})" onmouseover="hoverRating(${i})" onmouseout="resetHoverRating()">★</span>`).join('')}
      </div>
      <textarea class="form-textarea" id="rating-comment" placeholder="Comment (optional) / تعليق (اختياري)" style="margin-top:8px;min-height:60px"></textarea>
      <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="submitRating(${consult.id})">${t('submit')}</button>
    </div>` : '';

  const existingRatingHtml = consult.rating ? `
    <div style="padding:12px 20px;background:var(--green-light);border-top:1px solid var(--border);display:flex;align-items:center;gap:8px">
      <span style="font-size:.82rem;color:var(--green)">${'★'.repeat(consult.rating)}${'☆'.repeat(5-consult.rating)}</span>
      ${consult.rating_comment ? `<span style="font-size:.82rem;color:var(--ink-soft)">"${consult.rating_comment}"</span>` : ''}
    </div>` : '';

  el.innerHTML = `
    <div class="page">
      <div style="margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <button class="btn btn-sm btn-secondary" onclick="navigate('consultations')">← ${t('consultations')}</button>
        <span class="badge badge-${consult.status === 'in_progress' ? 'progress' : consult.status}">${t(consult.status === 'in_progress' ? 'in_progress' : consult.status)}</span>
        <span class="badge badge-${consult.priority}">${t(consult.priority)}</span>
        ${canAssign ? `<button class="btn btn-sm btn-primary" onclick="assignConsult(${consult.id})">🤝 ${t('assign_me')}</button>` : ''}
        ${canResolve ? `<button class="btn btn-sm btn-outline" onclick="resolveConsult(${consult.id})">✅ ${t('resolve')}</button>` : ''}
      </div>

      <div class="detail-grid">
        <!-- CHAT -->
        <div class="chat-container">
          <div class="chat-header">
            <div style="font-weight:700;font-size:1rem;margin-bottom:4px">${escHtml(title)}</div>
            <div style="font-size:.8rem;color:var(--ink-faint)">${desc}</div>
          </div>
          <div class="chat-messages" id="chat-msgs">${messagesHtml}</div>
          ${existingRatingHtml}
          ${ratingHtml}
          ${consult.status !== 'closed' && consult.status !== 'resolved' ? `
          <div class="chat-input-bar">
            <textarea id="msg-input" rows="2" placeholder="${t('type_message')}" onkeydown="handleMsgKey(event,${consult.id})"></textarea>
            <button class="btn btn-primary" onclick="sendMsg(${consult.id})">📤 ${t('send')}</button>
          </div>` : ''}
        </div>

        <!-- INFO PANEL -->
        <div style="display:flex;flex-direction:column;gap:16px">
          <div class="card">
            <div class="card-header"><strong>Consultation Info / معلومات الاستشارة</strong></div>
            <div class="card-body" style="font-size:.875rem;display:flex;flex-direction:column;gap:10px">
              <div><span class="text-muted">${t('patient_name')}:</span> <strong>${ptName}</strong></div>
              <div><span class="text-muted">${t('pharmacist_name')}:</span> <strong>${phName || t('unassigned')}</strong></div>
              <div><span class="text-muted">${t('category')}:</span> <strong>${consult.category}</strong></div>
              ${consult.drug_names ? `<div><span class="text-muted">${t('drug_names')}:</span> <strong>${consult.drug_names}</strong></div>` : ''}
              <div><span class="text-muted">Created:</span> <strong>${fmtDate(consult.created_at)}</strong></div>
              ${consult.resolved_at ? `<div><span class="text-muted">Resolved:</span> <strong>${fmtDate(consult.resolved_at)}</strong></div>` : ''}
            </div>
          </div>
          ${isPharm ? await renderPatientSummaryCard(consult.patient_id) : ''}
        </div>
      </div>
    </div>
  `;

  // Scroll chat to bottom
  const chatEl = document.getElementById('chat-msgs');
  if (chatEl) chatEl.scrollTop = chatEl.scrollHeight;
}

async function renderPatientSummaryCard(patientId) {
  try {
    const rec = await api('GET', `/patients/${patientId}`);
    const allergies = JSON.parse(rec.allergies || '[]');
    const meds = JSON.parse(rec.current_medications || '[]');
    return `<div class="card">
      <div class="card-header"><strong>Patient Summary / ملخص المريض</strong></div>
      <div class="card-body" style="font-size:.85rem">
        ${rec.blood_type ? `<div style="margin-bottom:8px"><span class="text-muted">${t('blood_type')}:</span> <strong>${rec.blood_type}</strong></div>` : ''}
        ${allergies.length ? `<div style="margin-bottom:8px"><span class="text-muted">${t('allergies')}:</span><br/>${allergies.map(a=>`<span class="allergy-chip">⚠️ ${a}</span>`).join('')}</div>` : ''}
        ${meds.length ? `<div><span class="text-muted">${t('medications')}:</span><br/>${meds.map(m=>`<span class="med-chip">💊 ${m}</span>`).join('')}</div>` : ''}
        ${!rec.blood_type && !allergies.length && !meds.length ? `<p class="text-muted">No health record on file.</p>` : ''}
      </div>
    </div>`;
  } catch { return ''; }
}


async function sendMsg(consultId) {
  const input = document.getElementById('msg-input');
  const body = input.value.trim();
  if (!body) return;
  input.value = '';

  try {
    await api('POST', `/consultations/${consultId}/messages`, { body });

    // Reload messages without full page reload
  
    const msgsData = await api('GET', `/consultations/${consultId}/messages`);
    console.log('messages response:', JSON.stringify(msgsData)); 

    const msgs = Array.isArray(msgsData) ? msgsData : (msgsData.results || []);
    console.log('msgs array:', msgs.length); 

    const chatEl = document.getElementById('chat-msgs');
    if (chatEl) {
      chatEl.innerHTML = msgs.map(m => {
        const isMine = m.sender_id === S.user.id;
        const isPh   = m.sender_role !== 'patient';
        const isPatient = S.user.role === 'patient';
        const cls    = isMine ? (isPatient ? 'msg-patient' : 'msg-pharmacist') : (isPh ? 'msg-pharmacist' : 'msg-patient');
        const avCls  = isPh ? 'msg-avatar-ph' : 'msg-avatar-p';
        const init   = (m.sender_name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
        const body   = S.lang === 'ar' && m.body_ar ? m.body_ar : m.body;
        return `<div class="msg ${cls}">
          <div class="msg-avatar ${avCls}">${init}</div>
          <div>
            <div class="msg-bubble">${escHtml(body)}</div>
            <span class="msg-time">${fmtTime(m.created_at)}</span>
          </div>
        </div>`;
      }).join('') || `<div class="msg msg-system"><div class="msg-bubble">No messages yet</div></div>`;

      // Scroll to bottom
      chatEl.scrollTop = chatEl.scrollHeight;
    }
  } catch(e) {
    alert('Failed to send message: ' + e.message);
  }
}




function handleMsgKey(e, id) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(id); }
}

async function assignConsult(id) {
  await api('PUT', `/consultations/${id}`, { assign: true });
  navigate('consult-detail', { id });
}

async function resolveConsult(id) {
  if (!confirm('Mark this consultation as resolved?')) return;
  await api('PUT', `/consultations/${id}`, { status: 'resolved' });
  navigate('consult-detail', { id });
}

let _selectedRating = 0;
function setRating(v) { _selectedRating = v; updateStars(v); }
function hoverRating(v) { updateStars(v); }
function resetHoverRating() { updateStars(_selectedRating); }
function updateStars(v) {
  document.querySelectorAll('#rating-stars .star').forEach(s => {
    s.classList.toggle('filled', parseInt(s.dataset.v) <= v);
    s.classList.toggle('empty', parseInt(s.dataset.v) > v);
  });
}
async function submitRating(id) {
  if (!_selectedRating) return alert('Please select a rating');
  await api('PUT', `/consultations/${id}`, {
    rating: _selectedRating,
    rating_comment: document.getElementById('rating-comment')?.value || ''
  });
  navigate('consult-detail', { id });
}

async function renderDrugs(el) {
  const drugs = await api('GET', '/drugs?q=');
  el.innerHTML = `
    <div class="page">
      <div class="page-header"><h2>${t('drugs')}</h2></div>

        </div>
      </div>
      <div id="drug-list">${renderDrugCards(drugs)}</div>
    </div>`;

function renderDrugCards(drugs) {
  if (!drugs.length) return `<div class="empty-state"><div class="empty-icon">💊</div><p>${t('no_data')}</p></div>`;
  return drugs.map(d => {
    const name = S.lang === 'ar' && d.name_ar ? d.name_ar : d.name;
    const generic = S.lang === 'ar' && d.generic_name_ar ? d.generic_name_ar : (d.generic_name || '');
    const cat = S.lang === 'ar' && d.category_ar ? d.category_ar : (d.category || '');
    const ind = S.lang === 'ar' && d.indications_ar ? d.indications_ar : (d.indications || '');
    const contra = S.lang === 'ar' && d.contraindications_ar ? d.contraindications_ar : (d.contraindications || '');
    const se = S.lang === 'ar' && d.side_effects_ar ? d.side_effects_ar : (d.side_effects || '');
    return `<div class="drug-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
        <div>
          <div class="drug-name">${escHtml(name)}</div>
          <div class="drug-generic">${escHtml(generic)}</div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
          <span class="badge badge-normal">${escHtml(cat)}</span>
          ${d.prescription_required ? `<span class="badge badge-urgent">Rx</span>` : `<span class="badge badge-resolved">OTC</span>`}
        </div>
      </div>
      <div class="drug-detail-grid">
        ${ind ? `<div class="drug-detail-item"><div class="label">${t('indications')}</div><div class="value">${escHtml(ind)}</div></div>` : ''}
        ${contra ? `<div class="drug-detail-item"><div class="label">${t('contraindications')}</div><div class="value" style="color:var(--red)">${escHtml(contra)}</div></div>` : ''}
        ${se ? `<div class="drug-detail-item"><div class="label">${t('side_effects')}</div><div class="value">${escHtml(se)}</div></div>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function searchDrugs(q) {
  const drugs = await api('GET', `/drugs?q=${encodeURIComponent(q)}`);
  document.getElementById('drug-list').innerHTML = renderDrugCards(drugs);
}

function showCreateRecordModal() {
  openModal('Create Health Record / إنشاء سجل صحي', recordFormHtml(null), [
    { label: t('cancel'), cls: 'btn-secondary', action: 'closeModal()' },
    { label: t('submit'), cls: 'btn-primary', action: 'submitRecord(false)' },
  ]);
}
function showEditRecordModal() {
  api('GET', `/patients/${S.user.id}`).then(rec => {
    openModal(t('edit_record'), recordFormHtml(rec), [
      { label: t('cancel'), cls: 'btn-secondary', action: 'closeModal()' },
      { label: t('save'), cls: 'btn-primary', action: 'submitRecord(true)' },
    ]);
  });
}

function recordFormHtml(rec) {
  const a = JSON.parse(rec?.allergies||'[]').join(', ');
  const c = JSON.parse(rec?.chronic_conditions||'[]').join(', ');
  const m = JSON.parse(rec?.current_medications||'[]').join('\n');
  return `
    <div class="form-row">
      <div class="form-group"><label class="form-label">${t('dob')}</label>
        <input class="form-input" id="r-dob" type="date" value="${rec?.date_of_birth||''}"/></div>
      <div class="form-group"><label class="form-label">${t('blood_type')}</label>
        <select class="form-select" id="r-bt">
          ${['','A+','A-','B+','B-','AB+','AB-','O+','O-'].map(bt=>`<option ${rec?.blood_type===bt?'selected':''}>${bt}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">${t('allergies')} (comma-separated)</label>
      <input class="form-input" id="r-allergies" value="${a}" placeholder="e.g. Penicillin, Sulfa"/></div>
    <div class="form-group"><label class="form-label">${t('conditions')} (comma-separated)</label>
      <input class="form-input" id="r-conditions" value="${c}" placeholder="e.g. Diabetes, Hypertension"/></div>
    <div class="form-group"><label class="form-label">${t('medications')} (one per line)</label>
      <textarea class="form-textarea" id="r-meds" rows="4" placeholder="e.g. Metformin 500mg twice daily">${m}</textarea></div>
    <div class="form-group"><label class="form-label">${t('emergency_contact')}</label>
      <input class="form-input" id="r-emergency" value="${rec?.emergency_contact||''}" placeholder="Name: +966…"/></div>`;
}

async function submitRecord(isEdit) {
  const btn = document.querySelector('#modal-footer .btn-primary');
  if (btn) btn.classList.add('btn-loading');
  const body = {
    user_id: S.user.id,
    date_of_birth: document.getElementById('r-dob').value || null,
    blood_type: document.getElementById('r-bt').value || null,
    allergies: JSON.stringify(document.getElementById('r-allergies').value.split(',').map(s=>s.trim()).filter(Boolean)),
    chronic_conditions: JSON.stringify(document.getElementById('r-conditions').value.split(',').map(s=>s.trim()).filter(Boolean)),
    current_medications: JSON.stringify(document.getElementById('r-meds').value.split('\n').map(s=>s.trim()).filter(Boolean)),
    emergency_contact: document.getElementById('r-emergency').value || null,
  };
  try {
    if (isEdit) await api('PUT', `/patients/${S.user.id}`, body);
    else await api('POST', '/patients', body);
    closeModal();
    navigate('my-record');
  } catch(e) {
    alert(e.message);
    if (btn) btn.classList.remove('btn-loading');
  }
}

async function loadNotifications() {
  if (!S.token) return;
  try {
    const notifs = await api('GET', '/notifications');
    S.notifications = notifs;
    S.unreadNotif = notifs.filter(n => !n.is_read).length;
    const dot = document.getElementById('notif-dot');
    if (dot) dot.classList.toggle('hidden', S.unreadNotif === 0);
    if (S.user) buildSidebar();
  } catch {}
}

function toggleNotifPanel() {
  const panel = document.getElementById('notif-panel');
  panel.classList.toggle('hidden');
  if (!panel.classList.contains('hidden')) renderNotifPanel();
}

function renderNotifPanel() {
  const list = document.getElementById('notif-list');
  document.getElementById('notif-panel-title').textContent = t('notifications');
  document.getElementById('notif-mark-all').textContent = t('mark_all_read');
  if (!S.notifications.length) {
    list.innerHTML = `<div class="notif-empty">${t('no_notif')}</div>`;
    return;
  }
  list.innerHTML = S.notifications.map(n => `
    <div class="notif-item ${n.is_read ? '' : 'unread'}" onclick="clickNotif(${n.id}, ${n.ref_id})">
      <div class="notif-title">${S.lang==='ar' && n.title_ar ? n.title_ar : n.title}</div>
      <div class="notif-body">${S.lang==='ar' && n.body_ar ? n.body_ar : (n.body||'')}</div>
      <div class="notif-time">${fmtTime(n.created_at)}</div>
    </div>`).join('');
}

async function clickNotif(id, refId) {
  await api('PUT', `/notifications/${id}`, {});
  document.getElementById('notif-panel').classList.add('hidden');
  await loadNotifications();
  if (refId) navigate('consult-detail', { id: refId });
}

async function markAllRead() {
  for (const n of S.notifications.filter(n=>!n.is_read)) {
    await api('PUT', `/notifications/${n.id}`, {});
  }
  await loadNotifications();
  renderNotifPanel();
}

// ============================================================
// MODAL
// ============================================================
function openModal(title, body, actions) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = (actions||[]).map(a=>
    `<button class="btn ${a.cls}" onclick="${a.action}">${a.label}</button>`
  ).join('');
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
function closeModalOnBg(e) { if (e.target === e.currentTarget) closeModal(); }

// ============================================================
// SIDEBAR MOBILE
// ============================================================
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('visible');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('visible');
}

// Close notif panel on outside click
document.addEventListener('click', e => {
  const panel = document.getElementById('notif-panel');
  const btn   = document.getElementById('notif-btn');
  if (panel && !panel.classList.contains('hidden') && !panel.contains(e.target) && e.target !== btn) {
    panel.classList.add('hidden');
  }
});

// ============================================================
// UTILS
// ============================================================
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(dt) {
  if (!dt) return '';
  return new Date(dt).toLocaleDateString(S.lang === 'ar' ? 'ar-SA' : 'en-GB', { day:'2-digit', month:'short', year:'numeric' });
}
function fmtTime(dt) {
  if (!dt) return '';
  return new Date(dt).toLocaleString(S.lang === 'ar' ? 'ar-SA' : 'en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
}

// ============================================================
// BOOT
// ============================================================
(async () => {
  const stored = localStorage.getItem('pharma_token');
  if (stored) {
    S.token = stored;
    try {
      S.user = await api('GET', '/auth/me');
      await initApp();
    } catch {
      localStorage.removeItem('pharma_token');
      S.token = null;
    }
  }
})();
</script>
</body>
</html>
